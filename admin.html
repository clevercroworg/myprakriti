<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Health & Wellness Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=PT+Serif:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="top-bar" style="display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 1.5rem; position: sticky; top: 0; z-index: 100;">
        <span class="top-bar-title">Content Management System</span>
        <div style="display: flex; gap: 12px; align-items: center;">
            <a href="index.html" class="back-link" style="color: #fff; text-decoration: none; font-size: 0.85rem; opacity: 0.8;"><i class="fa-solid fa-arrow-left"></i> Back to Site</a>
            <button id="btn-logout" style="background: rgba(239,68,68,0.8); color: #fff; border: none; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-family: 'Outfit',sans-serif; font-size: 0.8rem; font-weight: 600; transition: all 0.3s;"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
        </div>
    </div>

    <div class="app-container admin-container">
        <header class="header text-center">
            <h1 class="page-title"><i class="fa-solid fa-sliders"></i> Admin Dashboard</h1>
            <p class="subtitle">Manage homepage blog articles from this interface.</p>
        </header>

        <section class="admin-grid">
            <!-- Form Section -->
            <div class="admin-card">
                <h2 id="form-title"><i class="fa-solid fa-pen-to-square"></i> Add New Article</h2>
                <form id="blog-form">
                    <input type="hidden" id="blog-id">
                    
                    <div class="form-group">
                        <label for="blog-title">Article Title</label>
                        <input type="text" id="blog-title" required placeholder="e.g., The Importance of Hydration">
                    </div>

                    <div class="form-group">
                        <label for="blog-category">Category</label>
                        <select id="blog-category" required>
                            <option value="Nutrition">Nutrition</option>
                            <option value="Fitness">Fitness</option>
                            <option value="Mental Health">Mental Health</option>
                            <option value="General">General</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="blog-excerpt">Excerpt</label>
                        <textarea id="blog-excerpt" required placeholder="Brief summary of the article..." rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Article Image</label>
                        <div style="background: #fffbeb; border: 1px solid #fbbf24; border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 8px;">
                            <i class="fa-solid fa-triangle-exclamation" style="color: #f59e0b; margin-top: 2px;"></i>
                            <div style="font-size: 0.82rem; color: #92400e; line-height: 1.5;">
                                <strong>Max file size: 5MB</strong> — Images will be auto-compressed before upload.<br>
                                Supported formats: <strong>JPEG, PNG, GIF, WebP</strong>
                            </div>
                        </div>
                        <input type="file" id="blog-image-upload" accept="image/jpeg,image/png,image/gif,image/webp">
                        <input type="hidden" id="blog-image-data">
                        <div id="image-upload-status" style="margin-top: 8px; display: none; font-size: 0.85rem; padding: 8px 12px; border-radius: 6px;"></div>
                        <div id="image-upload-preview" style="margin-top: 10px; display: none;">
                            <img id="upload-preview-img" src="" style="max-height: 150px; border-radius: 8px; border: 1px solid #cbd5e1;">
                            <button type="button" id="btn-remove-image" class="btn btn-danger" style="margin-top: 5px; display: block;">Remove Image</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="blog-content">Full Article Content (HTML Supported)</label>
                        <textarea id="blog-content" required placeholder="Write the full content of your article here. You can use HTML tags like <p>, <h2>, <strong>, etc." rows="10"></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="button" id="btn-cancel" class="btn btn-secondary hidden">Cancel</button>
                        <button type="submit" id="btn-save" class="btn btn-primary">Save Article</button>
                    </div>
                </form>
            </div>

            <!-- List Section -->
            <div class="admin-card">
                <h2><i class="fa-solid fa-list"></i> Existing Articles</h2>
                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Details</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="blog-list-body">
                            <!-- Populated by admin.js -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <!-- We need blogs.js to access default data if needed, but admin.js has the primary logic -->
    <script src="blogs.js"></script>
    <script src="admin.js"></script>
</body>
</html>
