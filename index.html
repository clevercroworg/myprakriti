<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health & Wellness Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=PT+Serif:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <div class="top-bar">
        <span class="top-bar-title">Your Personal Wellness Hub</span>
    </div>

    <div class="app-container home-container">
        <header class="header" style="text-align: center; margin-bottom: 1rem;">
            <div class="logo" style="margin-bottom: 1.5rem;">
                <a href="index.html">
                    <img src="assets/Prakriti - logo.png" alt="MyPrakrit Logo" class="logo-img" style="height: 140px; width: auto; object-fit: contain;">
                </a>
            </div>
            <h3 class="subtitle" style="font-size: 1.2rem; font-weight: 500; color: var(--text-muted); max-width: 600px; margin: 0 auto; line-height: 1.5;">Track your health, build better habits, and feel your best.</h3>
        </header>

        <style>
            .top-bar {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 0.35rem 1rem;
                background-color: var(--primary); /* Update to new primary teal */
            }
            .top-bar-title {
                font-family: 'PT Serif', serif;
                font-size: 0.85rem;
                font-weight: 700;
                color: #ffffff;
                text-transform: uppercase;
                letter-spacing: 1px;
            }
            
            .nav-card.bg-health {
                background-color: var(--primary) !important; /* Update to new primary teal */
            }
            .nav-card.bg-health h3, .nav-card.bg-health p, .nav-card.bg-health i {
                color: #ffffff !important;
            }
            .nav-card.bg-health .nav-card-icon, .nav-card.bg-health .nav-card-arrow {
                background-color: rgba(255, 255, 255, 0.2) !important;
            }

            .nav-card.bg-nature {
                background-color: #15803d !important; /* Leaf Green */
            }
            .nav-card.bg-nature h3, .nav-card.bg-nature p, .nav-card.bg-nature i {
                color: #ffffff !important;
            }
            .nav-card.bg-nature .nav-card-icon, .nav-card.bg-nature .nav-card-arrow {
                background-color: rgba(255, 255, 255, 0.2) !important;
            }
            
            @media screen and (max-width: 768px) {
                .top-bar {
                    padding: 0.5rem 1rem;
                }
                .top-bar-title {
                    font-size: 0.95rem;
                }
                
                /* Mobile 2-grid for cards */
                .cards-grid {
                    grid-template-columns: repeat(2, 1fr) !important;
                    gap: 0.75rem !important;
                }
                .nav-card {
                    padding: 1.25rem 0.5rem !important;
                    min-height: auto;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    text-align: center;
                }
                .nav-card-icon {
                    width: 50px !important;
                    height: 50px !important;
                    font-size: 1.5rem !important;
                    margin-bottom: 0.5rem !important;
                }
                .nav-card-content h3 {
                    font-size: 1rem !important;
                    margin-bottom: 0.5rem !important;
                    line-height: 1.2;
                }
                .nav-card-arrow {
                    margin-top: 0.5rem !important;
                    display: flex !important; /* Ensure arrows are back */
                    width: 36px !important;
                    height: 36px !important;
                    transform: rotate(0deg) !important; /* Point right */
                }
            }
        </style>

        <!-- Calculators Section -->
        <section class="calculators-section">
            <div class="cards-grid">
                 <a href="health-calculator.html" class="nav-card bg-health">
                    <div class="nav-card-icon">
                        <i class="fa-solid fa-heart-pulse"></i>
                    </div>
                    <div class="nav-card-content">
                        <h3>Body metrics Analyser</h3>
                    </div>
                    <div class="nav-card-arrow">
                        <i class="fa-solid fa-arrow-right"></i>
                    </div>
                 </a>
                 <a href="lqs-assessment.html" class="nav-card bg-nature">
                    <div class="nav-card-icon">
                        <i class="fa-solid fa-leaf"></i>
                    </div>
                    <div class="nav-card-content">
                        <h3>Life Quality Assessment</h3>
                    </div>
                    <div class="nav-card-arrow">
                        <i class="fa-solid fa-arrow-right"></i>
                    </div>
                 </a>
            </div>
        </section>

        <!-- Blogs Section -->
        <section class="blogs-section fade-in">
            <h2 class="section-title"><i class="fa-solid fa-book-open"></i> Latest Health Articles</h2>
            <div id="dynamic-blogs-grid" class="blogs-grid">
                <!-- Blogs will be loaded dynamically by blogs.js -->
            </div>
        </section>

        <footer class="footer">
            <p>&copy; 2026 Health &amp; Wellness Hub. All rights reserved.</p>
        </footer>
    </div>
    <script src="blogs.js"></script>
</body>
</html>
