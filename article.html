<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article - Health & Wellness Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=PT+Serif:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="home.css">
    <style>
        .article-hero {
            position: relative;
            width: 100%;
            height: 400px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 2rem;
            background-color: #e2e8f0;
            background-size: cover;
            background-position: center;
        }

        .article-hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px;
        }

        .article-hero .blog-category {
            align-self: flex-start;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .article-hero .blog-title {
            color: #ffffff;
            font-size: 2.5rem;
            font-family: 'PT Serif', serif;
            margin: 0;
            line-height: 1.2;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .article-body {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            font-size: 1.1rem;
            line-height: 1.8;
            color: #334155;
            margin-bottom: 40px;
        }

        .article-body h2 {
            font-family: 'PT Serif', serif;
            color: #0f172a;
            font-size: 1.8rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        .article-body p {
            margin-bottom: 1.5rem;
        }

        .back-nav {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            transition: opacity 0.2s;
        }

        .back-nav:hover {
            opacity: 0.8;
        }

        .error-message {
            text-align: center;
            padding: 60px 20px;
        }

        .error-message h2 {
            font-size: 2rem;
            color: #334155;
            margin-bottom: 10px;
        }

        .error-message p {
            color: #64748b;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .article-hero {
                height: 300px;
                border-radius: 12px;
            }
            .article-hero-overlay {
                padding: 20px;
            }
            .article-hero .blog-title {
                font-size: 1.8rem;
            }
            .article-body {
                padding: 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="top-bar">
        <span class="top-bar-title">Health Insights</span>
    </div>

    <div class="app-container home-container" style="padding-top: 4rem;">
        
        <a href="index.html" class="back-nav"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>

        <main id="article-container">
            <!-- Article content will be injected here by article.js -->
            <div style="text-align: center; padding: 50px; color: var(--text-muted);">
                <i class="fa-solid fa-spinner fa-spin" style="font-size: 2rem;"></i>
                <p style="margin-top: 15px;">Loading article...</p>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Health &amp; Wellness Hub. All rights reserved.</p>
        </footer>
    </div>

    <script src="blogs.js"></script>
    <script src="article.js"></script>
</body>
</html>
